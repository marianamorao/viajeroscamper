<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viajeros Camper · Zaragoza</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0a2020 0%, #0f3030 50%, #0a2818 100%);
      display: flex; align-items: flex-start; justify-content: center;
      padding: 2rem 1rem 3rem;
      font-family: 'DM Sans', sans-serif;
    }

    .vc-wrap {
      width: 100%; max-width: 400px;
      display: flex; flex-direction: column; align-items: center;
      position: relative;
    }

    .vc-logo {
      width: 90px; height: 90px; border-radius: 50%;
      overflow: hidden;
      border: 3px solid rgba(230,160,30,0.6);
      margin-bottom: 0.75rem;
    }
    .vc-logo img { width: 100%; height: 100%; object-fit: cover; }

    .vc-name {
      font-family: 'Playfair Display', serif; font-size: 1.5rem;
      color: #f0e4b0; margin-bottom: 0.2rem;
    }
    .vc-handle { font-size: 0.78rem; color: rgba(255,255,255,0.38); margin-bottom: 0.45rem; }
    .vc-bio {
      font-size: 0.85rem; color: rgba(255,255,255,0.62);
      text-align: center; max-width: 280px; line-height: 1.5;
      margin-bottom: 0.35rem;
    }
    .vc-location {
      font-size: 0.76rem; color: rgba(230,160,30,0.85);
      display: flex; align-items: center; gap: 4px;
      margin-bottom: 1.5rem;
    }

    .vc-top { width: 100%; display: flex; flex-direction: column; gap: 9px; }

    .vc-btn {
      display: flex; align-items: center; gap: 11px;
      background: rgba(255,255,255,0.07);
      border: 0.5px solid rgba(255,255,255,0.18);
      border-radius: 999px; padding: 0.65rem 1.2rem;
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem; font-weight: 500;
      text-decoration: none; width: 100%;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    .vc-btn:hover { background: rgba(230,160,30,0.18); border-color: rgba(230,160,30,0.55); transform: translateY(-1px); }
    .vc-btn.wa { background: rgba(40,200,100,0.12); border-color: rgba(40,200,100,0.38); }
    .vc-btn .label { flex: 1; text-align: center; }

    .plat-icon {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; flex-shrink: 0;
    }
    .ic-wa   { background: rgba(40,200,100,0.25); }
    .ic-ig   { background: rgba(225,100,160,0.25); }
    .ic-yaes { background: rgba(29,158,117,0.3); }
    .ic-camp { background: rgba(230,160,30,0.25); }
    .arr { font-size: 12px; opacity: 0.35; }

    .section-label {
      font-size: 0.67rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(230,160,30,0.5); margin: 1.5rem 0 0.6rem;
      width: 100%;
    }

    .furgo-grid { width: 100%; display: flex; flex-direction: column; gap: 14px; }

    .furgo-card {
      border: 0.5px solid rgba(230,160,30,0.2);
      border-radius: 14px; overflow: hidden;
    }
    .furgo-header {
      display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.05);
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
      overflow: hidden; padding: 0;
    }
    .furgo-photo {
      width: 72px; height: 62px; object-fit: cover; flex-shrink: 0;
    }
    .furgo-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; color: #f0e4b0; font-weight: 700;
    }

    .furgo-links { display: flex; flex-direction: column; }

    .plat-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 0.6rem 1rem;
      background: transparent;
      border: none; border-bottom: 0.5px solid rgba(255,255,255,0.07);
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 0.84rem; font-weight: 500;
      text-decoration: none;
      transition: background 0.18s;
    }
    .plat-btn:last-child { border-bottom: none; }
    .plat-btn:hover { background: rgba(230,160,30,0.12); }
    .plat-btn .plat-name { flex: 1; }

    .vc-footer {
      margin-top: 2rem; font-size: 0.67rem;
      color: rgba(255,255,255,0.18);
    }
  </style>
</head>
